<!--SEARCH BAR-->

<form class="example-form">
  <mat-form-field class="example-full-width">
    <mat-label>Search</mat-label>
    <input matInput placeholder="Search" [formControl]="searchControl" />
  </mat-form-field>
</form>

<!------------->

<!--TREE-->

<mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">
  <!--LEAF-->
  <mat-tree-node
    *matTreeNodeDef="let node"
    matTreeNodePadding
    class="d-flex align-items-center text-secondary"
  >
    <button mat-icon-button disabled class="invisible pe-2"></button>
    <span class="flex-grow-1 text-truncate" [class.match]="isNodeMatch(node)">
      {{ node.text }}
    </span>
  </mat-tree-node>
  <!------------->

  <!--NODE-->

  <mat-tree-node
    *matTreeNodeDef="let node; when: hasChild"
    class="d-flex align-items-center"
  >
    <button
      mat-icon-button
      matTreeNodeToggle
      [attr.aria-label]="'Toggle ' + node.text"
      class="pe-2 btn btn-sm btn-outline-primary rounded"
      style="
        min-width: 38px;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <mat-icon class="mat-icon-rtl-mirror">
        {{ tree.isExpanded(node) ? "expand_more" : "chevron_right" }}
      </mat-icon>
    </button>
    <span class="flex-grow-1 text-truncate" [class.match]="isNodeMatch(node)">
      {{ node.text }}
    </span>
  </mat-tree-node>
  <!------------->
</mat-tree>
<!------------->
